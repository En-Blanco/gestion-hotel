<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/styles-login.css">

</head>

<body>

    <!-- TITULO PRINCIPAL OCULTO PARA VALIDACION -->

    <h1 class="hidden-title">
        Sistema de Gestión Hotelera
    </h1>

    <!-- CONTENEDOR LOGIN -->

    <div class="login-container">

        <!-- TARJETA -->

        <div class="login-card">

            <!-- HEADER -->

            <header class="login-header">

                <img src="../assets/isologo.png" alt="Logo Hotel" class="logo">

                <p>Iniciá sesión para continuar</p>

            </header>

            <!-- FORMULARIO -->

            <form class="login-form">

                <!-- EMAIL -->

                <div class="input-group">

                    <label for="email">
                        Correo electrónico
                    </label>

                    <input 
                        type="email"
                        id="email" 
                        placeholder="Ingrese su correo"
                    >

                </div>

                <!-- PASSWORD -->

                <div class="input-group">

                    <label for="password">
                        Contraseña
                    </label>

                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Ingrese su contraseña"
                    >

                </div>

                <!-- ROL -->

                <div class="input-group">

                    <label for="rol">
                        Ingresar como
                    </label>

                    <select id="rol">

                        <option value="cliente">
                            Cliente
                        </option>

                        <option value="admin">
                            Administrador
                        </option>

                    </select>

                </div>

                <!-- RECUPERAR -->

                <div class="options">

                    <a href="#">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <!-- BOTON -->

                <button type="submit" class="login-btn">

                    Ingresar

                </button>

            </form>

            <!-- REGISTRO -->

            <div class="register-link">

                <p>
                    ¿No tenés cuenta?
                    <a href="registro.html">
                        Registrarse
                    </a>
                </p>

            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-content">

            <!-- CONTACTO -->

            <div class="footer-contacto">

                <h2>Contacto</h2>

                <a href="mailto:info@enblanco.com">
                    info@enblanco.com
                </a>

                <a href="tel:+540000000000">
                    +54 000 000-0000
                </a>

            </div>

            <!-- REDES -->

            <div class="footer-redes">

                <h2>Redes</h2>

                <a href="https://instagram.com" target="_blank">
                    Instagram
                </a>

                <a href="https://linkedin.com" target="_blank">
                    LinkedIn
                </a>

            </div>

            <!-- COPYRIGHT -->

            <div class="footer-copy">

                <p>
                    © 2026 En Blanco - Gestión Hotelera.
                    Todos los derechos reservados.
                </p>

            </div>

        </div>

    </footer>

</body>
