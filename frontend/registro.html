<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/styles_registro.css">
</head>
<body>
<!-- HEADER -->
<header>
    <div class="logo">
        <img src="../assets/isologo.png" alt="En Blanco - Gestión Hotelera">
    </div>
    <!-- NAV -->
    <nav>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="quienes-somos.html">Quiénes somos</a>
        </div>
    </nav>
</header>
<!-- FORM DE REGISTRO -->
<div class="contenedor">
    <div class="registro-box">
        <h1>Creá tu cuenta</h1>
        <p>
            Tus reservas de forma simple, rápida y segura.
        </p>
        <form>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresá tu nombre">

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" placeholder="Ingresá tu apellido">

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@email.com">

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres">

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" name="confirmar" placeholder="Repetí tu contraseña">

            <button type="submit" class="btn">
                Registrarse
            </button>
        </form>
        <div class="login">
            <p>
                ¿Ya tienes cuenta?
                <a href="login.html">Iniciar sesión</a>
            </p>
        </div>
    </div>
</div>
<!-- FOOTER -->
<footer class="footer-content">
    <section class="footer-contacto">
        <h4>Contacto</h4>
        <a href="mailto:tucorreo@mail.com"> info@enblanco.com</a>
        <a href="tel:+540000000000"> +54 000 000-0000</a>
    </section>

    <section class="footer-redes">
        <h4>Redes</h4>
        <a href="https://instagram.com" target="_blank"> Instagram</a>
        <a href="https://linkedin.com/in" target="_blank"> LinkedIn</a>
    </section>

    <section class="footer-copy">
        <p>© 2026 En Blanco - Gestión Hotelera. Todos los derechos reservados.</p>
    </section>
    
</footer>

</body>
</html>
